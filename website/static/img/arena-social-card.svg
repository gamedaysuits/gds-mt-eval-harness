<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MT Eval Arena — 7,959 languages. One open scoreboard.">
  <!--
    MT Eval Arena — og:image source (1200×630).
    Render to PNG with cli/website/scripts/generate-social-cards.mjs
    (headless Chrome screenshot — see cli/website/DESIGN.md §1/§6).
    Same composition as the champollion card; coral arena accent.
    Fonts load from ../fonts/ (self-hosted; resolves when this file is
    opened from static/img/).
  -->
  <style>
    @font-face {
      font-family: 'Fraunces Variable';
      font-weight: 100 900;
      src: url('../fonts/fraunces-latin-opsz-normal.woff2') format('woff2-variations');
    }
    @font-face {
      font-family: 'Inter Variable';
      font-weight: 100 900;
      src: url('../fonts/inter-latin-opsz-normal.woff2') format('woff2-variations');
    }
    .label { font: 600 27px 'Inter Variable', sans-serif; letter-spacing: 0.22em; fill: #F08A93; }
    .hero  { font: 620 66px 'Fraunces Variable', serif; letter-spacing: -0.015em; fill: #E8EAE8; }
    .sub   { font: 450 27px 'Inter Variable', sans-serif; fill: #9AA5A0; }
    .domain{ font: 700 30px 'Inter Variable', sans-serif; fill: #F08A93; }
  </style>

  <rect width="1200" height="630" fill="#101312"/>
  <!-- soft accent wash (≤8% tint) — coral for the arena -->
  <radialGradient id="wash" cx="0.32" cy="0.18" r="0.9">
    <stop offset="0" stop-color="#F08A93" stop-opacity="0.07"/>
    <stop offset="1" stop-color="#F08A93" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#wash)"/>

  <!-- the stela mark — dark-theme carved-stone variant (logo-dark.svg) -->
  <g transform="translate(118,152) scale(9.6)">
    <clipPath id="stela">
      <path d="M5 29.5 L6.6 4.2 L18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6 L26.6 29.5 Z"/>
    </clipPath>
    <path d="M5 29.5 L6.6 4.2 L18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6 L26.6 29.5 Z" fill="#414C46"/>
    <g clip-path="url(#stela)" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6">
      <path d="M5 29.5 L6.6 4.2 L18.2 3" stroke="#67746D"/>
      <path d="M18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6" stroke="#8C9A92"/>
    </g>
    <g stroke-width="2.6" stroke-linecap="round" fill="none">
      <g stroke="#3FC1C0">
        <path d="M9.6 12.6h5.2"/>
        <path d="M17.6 12.6h5.6"/>
      </g>
      <g stroke="#E8B339">
        <path d="M9.5 17.6h2.6"/>
        <path d="M15 17.6h5"/>
        <path d="M22.8 17.6h0.8"/>
      </g>
      <g stroke="#F08A93">
        <path d="M9.4 22.6h7"/>
        <path d="M19.4 22.6h3.8"/>
      </g>
    </g>
  </g>

  <text class="label" x="478" y="208">MT EVAL ARENA</text>
  <text class="hero" x="472" y="298">7,959 languages.</text>
  <text class="hero" x="472" y="380">One open scoreboard.</text>
  <text class="sub" x="475" y="442">Open, reproducible benchmarks for low-resource MT</text>
  <text class="domain" x="475" y="540">mtevalarena.org</text>

  <!-- triad baseline rule -->
  <rect x="0" y="618" width="400" height="12" fill="#3FC1C0"/>
  <rect x="400" y="618" width="400" height="12" fill="#E8B339"/>
  <rect x="800" y="618" width="400" height="12" fill="#F08A93"/>
</svg>
