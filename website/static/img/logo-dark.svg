<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Champollion — rosetta stela mark">
  <!--
    Champollion — "Rosetta stela" mark (dark-theme variant: carved stone).
    Wave-3 rework: the previous dark variant was a white "paper squeeze"
    (light fill, deep registers) and still read as a paper document on
    dark backgrounds. The dark mark is now the SAME stone as light mode —
    a granite-grey slab lifted off the ink background, with the vitality
    triad incised bright, a lit top-left edge, and a brighter fracture
    facet on the broken corner (fresh stone breaks lighter — the one
    detail that says "stone", not "page"). See DESIGN.md §1.
  -->
  <clipPath id="stela">
    <path d="M5 29.5 L6.6 4.2 L18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6 L26.6 29.5 Z"/>
  </clipPath>
  <path d="M5 29.5 L6.6 4.2 L18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6 L26.6 29.5 Z" fill="#414C46"/>
  <g clip-path="url(#stela)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- lit top-left edge -->
    <path d="M5 29.5 L6.6 4.2 L18.2 3" stroke="#67746D" stroke-width="1.6"/>
    <!-- fracture facet: fresh break reads lighter than weathered faces -->
    <path d="M18.2 3 L20.6 6.4 L24.6 4.9 L27.4 9.6" stroke="#8C9A92" stroke-width="1.6"/>
  </g>
  <g stroke-width="2.6" stroke-linecap="round" fill="none">
    <g stroke="#3FC1C0">
      <path d="M9.6 12.6h5.2"/>
      <path d="M17.6 12.6h5.6"/>
    </g>
    <g stroke="#E8B339">
      <path d="M9.5 17.6h2.6"/>
      <path d="M15 17.6h5"/>
      <path d="M22.8 17.6h0.8"/>
    </g>
    <g stroke="#F08A93">
      <path d="M9.4 22.6h7"/>
      <path d="M19.4 22.6h3.8"/>
    </g>
  </g>
</svg>
