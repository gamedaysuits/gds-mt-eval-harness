<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Champollion — rosetta stela mark">
  <!--
    Champollion — "Rosetta stela" mark (light-theme variant: ink stone).
    A heavy stone slab with a jagged broken top-right corner, carrying
    three registers of incised script — the Rosetta Stone's two famous
    facts (three scripts, broken corner) and nothing else. Tapered sides
    and a flat base keep the silhouette reading as STONE, not paper:
    no rounded corners, no folded-corner cue. Registers are colored with
    the vitality triad: teal (thriving), amber (vulnerable), coral
    (endangered). Pure paths — no font dependencies. See DESIGN.md.
  -->
